site_name: journeyers - Python docs
site_dir: utils_doc/__doc_python
docs_dir: utils_doc/_doc_python_md
extra_css: 
  - css/custom_mkdocstrings.css
plugins:
- mkdocstrings:
    handlers: 
        python:
          paths: 
            - "utils_Python"          
          options:
            show_source: false
            show_root_heading: true